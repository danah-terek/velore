  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="800"/>

  <text x="84" y="110" font-size="28" class="muted" letter-spacing="2">VELORE DEMO</text>
  <rect x="84" y="132" width="92" height="8" class="accent" rx="4"/>
  <text x="84" y="180" font-size="54" fill="#151515" font-weight="650">Aurelia Gold Round Frames</text>
  <text x="84" y="232" font-size="24" class="muted">Lightweight metal " Adjustable nose pads</text>


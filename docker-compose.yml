services:
  postgres:
    # Includes pgvector, needed by the existing Prisma model `embeddings.embedding` (vector).
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velore
    volumes:
      - velore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d velore"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - AI_SERVICE_URL=http://ai-service:5001
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    command: npm run dev

  ai-service:
    build: ./ai-service
    ports:
      - "5001:5001"
    volumes:
      - ./ai-service:/app
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  velore_postgres_data: